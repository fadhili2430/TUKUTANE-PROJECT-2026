<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='css/organizer.css')}}">
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand">{{ current_user.name }}'s Events</span>
            <a href="{{ url_for('main.dashboard') }}" class="nav-link">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container mt-5">
        {% if events %}
            <div class="row g-4">
                {% for event in events %}
                    <div class="col-md-6 col-lg-4">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">{{ event.title }}</h5>
                                <p class="card-text text-muted">{{ event.activity }}</p>
                                <p class="card-text text-muted">{{ event.campus_area }}</p>
                                <div class="d-flex gap-2">
                                    <a href="{{ url_for('main.edit_event', event_id=event.id) }}" class="btn btn-sm btn-primary">Edit</a>
                                    <a href="{{ url_for('main.view_rsvps', event_id=event.id) }}" class="btn btn-sm btn-outline-primary">RSVPs</a>
                                </div>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="alert alert-info">
                <p>You have not organized any events yet.</p>
            </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
